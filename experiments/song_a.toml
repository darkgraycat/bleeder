[meta]
main = "main"
bleeds = ["./experiments/included.toml"]

[seq.main]
repeat = 2
content = """
> @riff_1 c3 0.5 : @riff_1
> @riff_1 c4 0.5 : @riff_1
"""

[seq.riff_1]
args = 'note:c3 vol:1.0'
repeat = 4
content = """
> note 1 vol : 1
> note+2 1 vol+0.1 | +2 : 1
"""

[seq.riff_2_advanced_stuff]
# using default duration:1.0 and default volume:1.0
content = """
> c3 : 1 ||
> d3 : 1 #
> ~44020
"""
