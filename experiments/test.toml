[meta]
main = 'main'
include = [
	'test_nested.toml',
	'dev_log_bleeds.toml'
]

[lane.main]
content = '''
#@song3:60:8:+2
#@song3:g3:2 < <+4 <::+2 # fix, make sure I can pass -2

#@track2 <
@standNbleed:a3:e4
@standNbleed:a4:e4
'''

[lane.song3]
vars = 'a:e2 T:8 b:a'
content = '''
>a-12:T |
>a:T/2 <:T/4 <+1 <-1:T/2

>b-12:T |
>b:T/2 <:T/4 <+1 <-1:T/2
>b-5:T
'''


[lane.track2]
content = '''
@chord:a2:4 | @arpeg:a3:1
@chord:f2:4 | @arpeg:f3:1
@chord:d2:4 | @arpeg:d3:1
@chord:d2:4 | @arpeg:d3:1
'''

[lane.track1]
vars = 'tone:a3 bass:tone-12'
content = '''
>bass+0:4 | >tone <+2 <+1 <+2
>bass-4:4 | >tone <+2 <+1 <+2
>bass-7:4 | >tone <+2 <+1 <+2
>bass-5:4 | >tone <+2 <+3 <-3
'''

[riff.part2]
vars = 'a:e2 b:a+7'
content = '''
a _
b _
'''
