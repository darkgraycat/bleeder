# BLEEDER COMPOSITION: "Night Drive" by Aelin

[meta]
main = 'song'

# ============================================
# BASS PATTERNS (Riff syntax - grid-based)
# ============================================

[riff.bassGroove]
vars = 'root:a2'
content = '''
root	_       root+12  _
_		root    >        root
'''

[riff.bassFill]
vars = 'root:a2'
content = '''
root  root+7  root+12  root+7
'''

# ============================================
# DRUM PATTERN (Riff syntax)
# ============================================

[riff.drums]
content = '''
36  _   38  _   36  36  38  _
42  42  42  42  42  42  42  42
'''
# 36 = kick, 38 = snare, 42 = hi-hat

# ============================================
# LEAD MELODY (Lane syntax - sequential)
# ============================================

[lane.melodyA]
vars = 'root:a4'
content = '''
>root:2 >root+7:1 >root+5:1 |
>root+12:4
'''

[lane.melodyB]
vars = 'root:a4'
content = '''
>root+7:1 >root+5:1 >root+3:1 >root:1 |
>root-2:2 >root:2
'''

# ============================================
# CHORD PROGRESSION (Lane syntax)
# ============================================

[lane.chords]
vars = 'r:a3 d:4'  # root, duration
content = '''
>r:d | >r+3:d | >r+7:d
'''

[lane.chordProgression]
content = '''
@chords:a3:8  # Am chord (a3, c4, e4)
@chords:f3:8  # F chord  (f3, a3, c4)
@chords:c3:8  # C chord  (c3, e3, g3)
@chords:g3:8  # G chord  (g3, b3, d4)
'''

# ============================================
# ARRANGEMENT (putting it together)
# ============================================

[lane.verse]
content = '''
@bassGroove:a2  @melodyA:a4 @chords:a3:8 |
@bassGroove:f2  @melodyB:a4 @chords:f3:8 |
@bassGroove:c3  @melodyA:c5 @chords:c3:8 |
@bassFill:g2    @melodyB:g4 @chords:g3:8
'''

[lane.verseWithDrums]
content = '''
@drums | @verse
'''

# ============================================
# MAIN SONG STRUCTURE
# ============================================

[lane.song]
content = '''
# intro - just drums
@drums @drums

# verse 1
@verseWithDrums

# verse 2 (transpose up 2 semitones)
@bassGroove:b2  @melodyA:b4 @chords:b3:8 | @drums |
@bassGroove:g2  @melodyB:b4 @chords:g3:8 | @drums |
@bassGroove:d3  @melodyA:d5 @chords:d3:8 | @drums |
@bassFill:a2    @melodyB:a4 @chords:a3:8 | @drums

# outro - fade on bass
@bassGroove:a2:0.8 | @drums |
@bassGroove:a2:0.5 | @drums |
@bassGroove:a2:0.3 | @drums
'''
